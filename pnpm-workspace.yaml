packages:
  - "apps/*"
  - "packages/*"

# pnpm v10 skips dependency build scripts unless whitelisted here; without this
# a fresh install (Docker build stage) gets no esbuild/workerd binaries and no
# compiled better-sqlite3 — builds then fail non-obviously.
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - workerd
  - sharp
