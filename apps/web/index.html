<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#106b55" />
    <meta name="description" content="Murojaah membantu hafalan Al-Qur'an ayat demi ayat." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" />
    <title>Murojaah — Teman Hafalanmu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://equran.id" />
    <link rel="dns-prefetch" href="https://equran.id" />
    <!-- Non-blocking font load: renders with the system-font fallback below first,
         swaps in Manrope/Noto Naskh once fetched — avoids the @import render-block. -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Naskh+Arabic:wght@500;600&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Naskh+Arabic:wght@500;600&display=swap" /></noscript>
    <script>
      (function(){
        try{
          var t=localStorage.getItem('theme');
          if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.setAttribute('data-theme','dark');
        }catch(ignore){}
      })();
    </script>
    <style>
      html,body{margin:0;min-width:320px;min-height:100%;background:#f8f7f2}
      #app-boot{box-sizing:border-box;min-height:100vh;display:grid;place-content:center;justify-items:center;padding:24px;background:#f8f7f2;color:#18332c;font-family:system-ui,-apple-system,sans-serif;text-align:center}
      .boot-mark{width:56px;height:56px;border-radius:17px;background:#106b55;color:white;display:grid;place-items:center;font-size:27px;box-shadow:0 12px 30px #106b5533;animation:boot 1.2s ease-in-out infinite alternate}
      #app-boot b{margin-top:16px;font-size:18px}
      #app-boot [data-boot-status]{max-width:330px;margin-top:5px;color:#42524c;font-size:12px;line-height:1.6}
      #app-boot button{margin-top:18px;border:0;border-radius:11px;background:#106b55;color:#fff;min-height:44px;padding:0 20px;font:700 13px system-ui,-apple-system,sans-serif}
      @keyframes boot{to{transform:translateY(-6px) rotate(-2deg);box-shadow:0 18px 36px #106b5544}}
      @media(prefers-reduced-motion:reduce){.boot-mark{animation:none}}
      html[data-theme="dark"],html[data-theme="dark"] body{background:#0e1613}
      html[data-theme="dark"] #app-boot{background:#0e1613;color:#eef3f0}
    </style>
  </head>
  <body>
    <div id="root">
      <main id="app-boot">
        <span class="boot-mark">۞</span>
        <b>Murojaah</b>
        <span data-boot-status>Menyiapkan ruang hafalanmu…</span>
        <button data-boot-retry hidden onclick="window.__hafizRetry()">Bersihkan cache &amp; muat ulang</button>
      </main>
    </div>
    <script>
      (function(){
        var version='hafizayat-v7';
        try{
          if(localStorage.getItem('hafizayat-runtime')!==version){
            localStorage.setItem('hafizayat-runtime',version);
            if(window.caches)caches.keys().then(function(keys){return Promise.all(keys.filter(function(key){return key.indexOf('hafizayat-')===0}).map(function(key){return caches.delete(key)}))});
          }
        }catch(ignore){}
        window.__hafizRetry=function(){
          try{if(window.caches)caches.keys().then(function(keys){return Promise.all(keys.map(function(key){return caches.delete(key)}))}).then(function(){location.replace('/?refresh='+Date.now())});else location.replace('/?refresh='+Date.now())}catch(ignore){location.reload()}
        };
        window.__hafizBootTimer=setTimeout(function(){var root=document.getElementById('root');if(root&&root.querySelector('#app-boot')){var status=root.querySelector('[data-boot-status]');var retry=root.querySelector('[data-boot-retry]');if(status)status.textContent='Aplikasi belum berhasil dimuat. Periksa koneksi lalu coba lagi.';if(retry)retry.hidden=false}},8000);
        window.addEventListener('error',function(event){if(event.target&&event.target.tagName==='SCRIPT'){var retry=document.querySelector('[data-boot-retry]');var status=document.querySelector('[data-boot-status]');if(status)status.textContent='Berkas aplikasi gagal dimuat. Silakan coba lagi.';if(retry)retry.hidden=false}},true);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
