<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#106b55" />
    <meta name="description" content="Murojaah membantu hafalan Al-Qur'an ayat demi ayat." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" />
    <title>Murojaah — Teman Hafalanmu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://equran.id" />
    <link rel="dns-prefetch" href="https://equran.id" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Naskh+Arabic:wght@500;600&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Naskh+Arabic:wght@500;600&display=swap" /></noscript>
    <script>
      (function(){
        try{
          var t=localStorage.getItem('theme');
          if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.setAttribute('data-theme','dark');
        }catch(ignore){}
      })();
    </script>
    <style>
      html,body{margin:0;min-width:320px;min-height:100%;background:#f8f7f2}
      #root{min-height:100vh}
      .landing{background:#f8f7f2;min-height:100vh;display:flex;flex-direction:column}
      .landing-nav{max-width:1160px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:20px 5vw;width:100%;box-sizing:border-box}
      .brand{display:flex;align-items:center;gap:10px;font-size:21px;font-weight:800;font-family:system-ui,-apple-system,sans-serif}
      .brand span{color:#18332c}
      .brand span span{color:#106b55}
      .brandmark{width:38px;height:38px;border-radius:12px;background:#106b55;display:grid;place-items:center}
      .brandmark svg{width:21px;color:#fff}
      .landing-nav-actions{display:flex;align-items:center;gap:16px}
      .icon-btn{border:0;background:transparent;cursor:pointer;width:38px;height:38px;display:grid;place-items:center;border-radius:9px;color:#42524c;font-size:18px;padding:0}
      .link-btn{border:0;background:transparent;color:#106b55;font-weight:700;font-size:12px;cursor:pointer;font-family:system-ui,-apple-system,sans-serif}
      .primary{border:0;background:#106b55;color:#fff;min-height:40px;padding:0 18px;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;font-family:system-ui,-apple-system,sans-serif}
      .landing-hero{max-width:1160px;margin:0 auto;padding:30px 5vw 60px;display:flex;align-items:center;gap:40px;width:100%;box-sizing:border-box}
      .landing-hero-copy{flex:1;max-width:560px}
      .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:100px;border:1px solid;font-size:10px;font-weight:700;letter-spacing:.5px;font-family:system-ui,-apple-system,sans-serif}
      .pill.dark{background:#def0e8;border-color:#cfe7dc;color:#106b55}
      .pill svg{width:14px}
      .landing-hero h1{font-size:38px;line-height:1.15;letter-spacing:-.8px;margin:18px 0 14px;color:#18332c;font-family:system-ui,-apple-system,sans-serif}
      @media(max-width:560px){.landing-hero h1{font-size:28px}}
      .landing-hero-copy>p{color:#42524c;font-size:14px;line-height:1.7;margin:0 0 22px;font-family:system-ui,-apple-system,sans-serif}
      .landing-cta-row{display:flex;align-items:center;gap:18px;margin-bottom:14px}
      .primary.large{min-height:50px;padding:0 26px;font-size:13px}
      .safe{font-size:11px;color:#42524c;margin:0;font-family:system-ui,-apple-system,sans-serif}
      .landing-hero-art{flex:1;max-width:340px;aspect-ratio:1;position:relative;display:grid;place-items:center}
      .landing-hero-art .moon{position:absolute;width:230px;height:230px;border-radius:50%;background:#def0e8;color:#106b55;display:grid;place-items:center;font-size:60px}
      .landing-hero-art .quran{width:150px;height:96px;display:grid;place-items:center;background:#def0e8;border-radius:20px}
      .landing-hero-art .quran svg{width:60px;height:60px;color:#106b55}
      @media(max-width:900px){.landing-hero{flex-direction:column;text-align:center}.landing-hero-copy{max-width:none}.landing-cta-row{justify-content:center;flex-wrap:wrap}}
      html[data-theme="dark"],html[data-theme="dark"] body{background:#0e1613}
      html[data-theme="dark"] .landing{background:#0e1613}
      html[data-theme="dark"] .brand span{color:#eef3f0}
      html[data-theme="dark"] .landing-hero h1{color:#eef3f0}
      html[data-theme="dark"] .icon-btn{color:#aabcba}
    </style>
  </head>
  <body>
    <div id="root">
      <div class="landing">
        <header class="landing-nav">
          <div class="brand"><span class="brandmark"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span><span>Muro<span>jaah</span></span></div>
          <div class="landing-nav-actions">
            <button class="icon-btn" aria-label="Ganti mode terang/gelap"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
            <button class="link-btn" data-auth="login">Masuk</button>
            <button class="primary" data-auth="register">Daftar Gratis</button>
          </div>
        </header>
        <section class="landing-hero">
          <div class="landing-hero-copy">
            <span class="pill dark"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg> SEDIKIT TAPI KONSISTEN</span>
            <h1>Hafalanmu nggak akan hilang lagi.</h1>
            <p>Al-Qur'an mudah dihafal tapi gampang lupa. Murojaah bantu kamu — atau anakmu, atau muridmu — mengulang ayat yang tepat, di waktu yang tepat, tanpa drama.</p>
            <div class="landing-cta-row">
              <button class="primary large" data-auth="register">Mulai Gratis</button>
              <button class="link-btn" data-auth="login">Sudah punya akun? Masuk</button>
            </div>
            <p class="safe">Gratis selamanya untuk hafalan pribadi. Nggak perlu kartu kredit.</p>
          </div>
          <div class="landing-hero-art">
            <div class="moon">✦</div>
            <div class="quran"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
          </div>
        </section>
      </div>
    </div>
    <script>
      (function(){
        var version='hafizayat-v7';
        try{
          if(localStorage.getItem('hafizayat-runtime')!==version){
            localStorage.setItem('hafizayat-runtime',version);
            if(window.caches)caches.keys().then(function(keys){return Promise.all(keys.filter(function(key){return key.indexOf('hafizayat-')===0}).map(function(key){return caches.delete(key)}))});
          }
        }catch(ignore){}
        window.__hafizRetry=function(){
          try{if(window.caches)caches.keys().then(function(keys){return Promise.all(keys.map(function(key){return caches.delete(key)}))}).then(function(){location.replace('/?refresh='+Date.now())});else location.replace('/?refresh='+Date.now())}catch(ignore){location.reload()}
        };
        window.__hafizBootTimer=setTimeout(function(){var root=document.getElementById('root');if(root&&root.querySelector('.landing')){var retry=document.querySelector('[data-boot-retry]');if(retry)retry.hidden=false}},8000);
        window.addEventListener('error',function(event){if(event.target&&event.target.tagName==='SCRIPT'){var retry=document.querySelector('[data-boot-retry]');if(retry)retry.hidden=false}},true);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
