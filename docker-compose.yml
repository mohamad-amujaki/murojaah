services:
  app:
    build: .
    image: murojaah:latest
    container_name: murojaah
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - murojaah-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8787
      - DATABASE_URL=file:/app/data/murojaah.db
      - STATIC_DIR=/app/static
      - REDIS_URL=redis://redis:6379
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: murojaah-redis
    restart: unless-stopped
    # Rate-limit counters only — no persistence needed; losing them on restart
    # just resets the counters, which is acceptable.
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  murojaah-data:
